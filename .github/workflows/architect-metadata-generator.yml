name: Generate Architect Metadata

on:
  workflow_dispatch:

jobs:
  report:
    name: Analyze Repository and Generate Architect Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download repo-metadata-generator pack
        run: |
          curl -L -o repo-metadata-generator-1.0.0.tar.gz \
            "https://github.com/ricardocovo/agent-primitives/raw/main/packs/repo-metadata-generator-1.0.0.tar.gz"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install GitHub Copilot CLI
        run: npm i -g @github/copilot

      - name: Clean .github folder
        run: rm -rf .github

      - name: Install APM and Unpack Metadata Generator
        run: |
          curl -sSL https://aka.ms/apm-unix | sh
          apm unpack repo-metadata-generator-1.0.0.tar.gz
          
      - name: Run Documentation
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN}}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          copilot --agent repo-analyzer --prompt "/fleet Run all the prompts in the .github/prompts" --silent --allow-all-tools --allow-all-paths < /dev/null

      - name: Upload architect metadata
        uses: actions/upload-artifact@v4
        with:
          name: architect-metadata
          path: architects-metadata/